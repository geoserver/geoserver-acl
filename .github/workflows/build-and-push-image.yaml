# Builds and pushes multi-arch docker images on main and tags.
# Each architecture builds natively (no QEMU) so the JVM AOT cache is correct.
name: Build and Push Docker image
on:
  push:
    branches:
      - main
    tags:
      - '*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'geoserver/geoserver-acl'
    name: Build (${{ matrix.platform }})
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Set version tag
      run: echo "TAG=$(make show-version)" >> $GITHUB_ENV

    - name: Package
      run: make package

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@v6
      with:
        context: ./src/infrastructure/app-main
        platforms: ${{ matrix.platform }}
        push: true
        outputs: type=image,name=geoservercloud/geoserver-acl,push-by-digest=true,name-canonical=true

    - name: Export digest
      run: |
        mkdir -p /tmp/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "/tmp/digests/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@v4
      with:
        name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
        path: /tmp/digests/*
        retention-days: 1

  push-manifest:
    if: github.repository == 'geoserver/geoserver-acl'
    name: Push manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set version tag
      run: echo "TAG=$(make show-version)" >> $GITHUB_ENV

    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: /tmp/digests
        pattern: digest-*
        merge-multiple: true

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Create multi-platform manifest and push
      working-directory: /tmp/digests
      run: |
        docker buildx imagetools create \
          -t geoservercloud/geoserver-acl:${{ env.TAG }} \
          $(printf 'geoservercloud/geoserver-acl@sha256:%s ' *)
